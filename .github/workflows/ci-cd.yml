name: CI/CD Starter

on:
  pull_request:
  push:
    branches: ["main", "master", "develop", "feature/**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect JS project
        id: detect
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "has_package_json=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_package_json=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.has_package_json == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.detect.outputs.has_package_json == 'true'
        run: npm ci

      - name: Lint
        if: steps.detect.outputs.has_package_json == 'true'
        run: npm run lint --if-present

      - name: Typecheck
        if: steps.detect.outputs.has_package_json == 'true'
        run: npm run typecheck --if-present

      - name: Test
        if: steps.detect.outputs.has_package_json == 'true'
        run: npm test --if-present

      - name: Build
        if: steps.detect.outputs.has_package_json == 'true'
        run: npm run build --if-present

      - name: No package.json notice
        if: steps.detect.outputs.has_package_json != 'true'
        run: echo "No package.json detected yet. CI passed with starter checks only."
